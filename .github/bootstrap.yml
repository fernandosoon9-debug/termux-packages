name: Build Bootstrap
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Build bootstrap
        run: ./scripts/run-docker.sh ./scripts/build-bootstraps.sh --architectures aarch64
      - uses: actions/upload-artifact@v4
        with:
          name: bootstrap-aarch64
          path: bootstrap-aarch64.zip
